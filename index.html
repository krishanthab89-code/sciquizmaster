<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sci Master</title>

<style>
:root{
--bg:#f4f7fb;
--card:rgba(255,255,255,0.6);
--text:#111;
--accent:#0072ff;
}
body.dark{
--bg:#0f172a;
--card:rgba(255,255,255,0.08);
--text:#fff;
--accent:#00c6ff;
}
body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
transition:0.3s;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
font-size:22px;
font-weight:bold;
}
.toggle{
cursor:pointer;
padding:6px 12px;
border-radius:20px;
background:var(--accent);
color:white;
}
.container{
max-width:800px;
margin:auto;
padding:20px;
}
.card{
backdrop-filter:blur(20px);
background:var(--card);
border-radius:20px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
margin-top:20px;
animation:fade 0.5s ease;
}
.option{
margin:10px 0;
padding:10px;
background:rgba(0,0,0,0.05);
border-radius:10px;
cursor:pointer;
transition:0.2s;
}
.option:hover{
transform:scale(1.05);
background:var(--accent);
color:white;
}
@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* Medal Styles */
.medal{
font-size:22px;
font-weight:bold;
padding:6px;
border-radius:10px;
animation:bounce 1s infinite alternate;
}
.gold{color:#FFD700;}
.silver{color:#C0C0C0;}
.bronze{color:#cd7f32;}
@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-5px);}
}

/* Start Row Flex */
.start-row{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}
.start-row input,
.start-row button{
width:100%;
max-width:400px;
box-sizing:border-box;
font-size:18px;
padding:15px 20px;
border-radius:25px;
border:none;
text-align:center;
transition:0.2s;
}
.start-row input:focus{
outline:none;
box-shadow:0 0 10px var(--accent);
}
.start-row button:hover{
transform:scale(1.03);
opacity:0.9;
}

/* Mobile-friendly Top 10 */
#top10Box{
max-height:300px;
overflow-y:auto;
}
#top10Box p{
margin:5px 0;
font-size:16px;
line-height:1.3;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
#top10Box h3{
text-align:center;
}
@media(max-width:600px){
header{font-size:18px;}
.card{padding:15px;}
#top10Box h3{font-size:18px;}
#top10Box p{font-size:14px;}
}
</style>
</head>
<body>

<header>
Sci Master
<div class="toggle" onclick="toggleMode()">Light/Dark</div>
</header>

<div class="container">

<!-- Start Quiz Box -->
<div id="startBox" class="card">
<h3 style="text-align:center;margin-bottom:20px;">Enter Details</h3>
<div class="start-row">
<input id="school" placeholder="School Name">
<input id="name" placeholder="Your Name">
<button onclick="startQuiz()">Start Quiz</button>
</div>
</div>

<!-- Quiz Box -->
<div id="quizBox" class="card" style="display:none;"></div>

<!-- Result Box -->
<div id="resultBox" class="card" style="display:none;"></div>

<!-- Separate Top 10 Box -->
<div id="top10Box" class="card">
<h3>🏆 Top 10 Players</h3>
<div id="top10List"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, onSnapshot, query, orderBy, limit }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
apiKey: "AIzaSyDEeEjSxUuc4eYK-UlaYjUw5mO7QEL7Xtc",
authDomain: "frstquiz.firebaseapp.com",
projectId: "frstquiz",
storageBucket: "frstquiz.firebasestorage.app",
messagingSenderId: "65834831504",
appId: "1:65834831504:web:492e2e1756eca03dce1215"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Inputs
const schoolInput = document.getElementById("school");
const nameInput = document.getElementById("name");
const startBox = document.getElementById("startBox");
const quizBox = document.getElementById("quizBox");
const resultBox = document.getElementById("resultBox");

let questions=[], current=0, score=0, key="";

// Start Quiz
window.startQuiz = async function(){
  const school = schoolInput.value.trim();
  const name = nameInput.value.trim();
  if(!school || !name){ alert("Fill all fields"); return; }

  key = name + "_" + school;

  // Check if already played
  const snap = await getDocs(collection(db,"participants"));
  let played = false;
  snap.forEach(doc=>{ if(doc.data().key === key) played = true; });
  if(played){ alert("You have already played the quiz!"); return; }

  // Load questions
  const qSnap = await getDocs(collection(db,"questions"));
  questions = [];
  qSnap.forEach(doc => questions.push(doc.data()));
  if(questions.length===0){ alert("No questions found!"); return; }
  questions.sort(()=>Math.random()-0.5);

  startBox.style.display="none";
  quizBox.style.display="block";
  loadQuestion();
}

// Load question
function loadQuestion(){
  if(current >= questions.length){ finish(); return; }
  let q = questions[current];
  let html = `<h3>${current+1}. ${q.q}</h3>`;
  q.options.forEach((o,i)=>{
    html += `<div class="option" onclick="selectAns(${i})">${o}</div>`;
  });
  quizBox.innerHTML = html;
}

// Select answer
window.selectAns = function(i){
  const options = document.querySelectorAll(".option");
  const correct = questions[current].answer;

  options.forEach((el, idx) => {
    if(idx === correct){ el.style.background = "green"; el.style.color = "white"; }
    if(idx === i && i !== correct){ el.style.background = "red"; el.style.color = "white"; }
    el.style.pointerEvents = "none";
  });

  if(i === correct) score++;

  setTimeout(()=>{
    current++;
    loadQuestion();
  }, 1000);
}

// Finish Quiz
async function finish(){
  quizBox.style.display="none";
  resultBox.style.display="block";

  await addDoc(collection(db,"participants"),{
    key:key,
    score:score,
    timestamp:Date.now()
  });

  resultBox.innerHTML = `<h2>Your Score: ${score}</h2>`;
}

// Toggle Light/Dark Mode
window.toggleMode = function(){
  document.body.classList.toggle("dark");
}

// Live Top 10 Separate (compact/mobile-friendly)
function updateTop10(){
  const topQuery = query(collection(db,"participants"), orderBy("score","desc"), limit(10));
  const top10List = document.getElementById("top10List");

  onSnapshot(topQuery, snap => {
    let html = "";
    let rank = 1;
    snap.forEach(doc => {
      const d = doc.data();
      let medal = "";
      if(rank===1) medal='<span class="medal gold">🥇</span>';
      if(rank===2) medal='<span class="medal silver">🥈</span>';
      if(rank===3) medal='<span class="medal bronze">🥉</span>';
      html += `<p>${medal} ${rank}. ${d.key} - ${d.score}</p>`;
      rank++;
    });
    top10List.innerHTML = html;
  });
}

// Initialize Top 10 list on page load
updateTop10();
</script>

</body>
</html>
